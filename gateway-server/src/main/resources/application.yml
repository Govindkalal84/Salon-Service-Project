server:
  port: 5000

spring:
  application:
    name: gateway-service


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://lemur-18.cloud-iam.com/auth/realms/salon-auth-test

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # BOOKING SERVICE
        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/api/bookings/**

        # USER SERVICE
        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**, /api/admin/users/**, /api/users/**, /users/**,/auth/**

        # SALON SERVICE
        - id: salon-service
          uri: lb://SALON-SERVICE
          predicates:
            - Path=/api/salons,/api/salons/**

            # AUTH APIs ✅ ADD THIS


        # SERVICE OFFERING
        - id: service-offering
          uri: lb://SERVICE-OFFERING
          predicates:
            - Path=/api/service-offering/**

        # CATEGORY SERVICE
        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/api/categories/**

           #notification
        - id: notifications-service
          uri: lb://NOTIFICATIONS-SERVICE
          predicates:
            - Path=/api/notifications/**

          #review-service
        - id: review-service
          uri: lb://REVIEW-SERVICE
          predicates:
            - Path=/api/review/**



        # PAYMENT SERVICE
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**




eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://eureka-4.onrender.com/eureka/